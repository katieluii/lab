name: Refresh Concert Data

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 7am UTC
  workflow_dispatch:      # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/wigmore.py > src/data/nota-concerts.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/nota-concerts.json
          git diff --staged --quiet || (
            git commit -m "chore: refresh Wigmore Hall concert data" &&
            git push
          )
